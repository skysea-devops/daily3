name: Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - "app-backend/**"
      - "app-frontend/**"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - "app-backend/**"
      - "app-frontend/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build Lambda functions
  # ────────────────────────────────────────────────────────────────────────────
  build-lambdas:
    name: Build Lambda functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app-backend/package-lock.json

      - name: Install dependencies
        working-directory: app-backend
        run: npm ci

      - name: Type check
        working-directory: app-backend
        run: npm run typecheck

      - name: Build
        working-directory: app-backend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-dist
          path: app-backend/lambdas/**/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build Next.js frontend
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app-frontend/package-lock.json

      - name: Install dependencies
        working-directory: app-frontend
        run: npm ci

      - name: Build
        working-directory: app-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.NEXT_PUBLIC_COGNITO_CLIENT_ID }}

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: app-frontend/out/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Terraform plan / apply
  # ────────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    needs: [build-lambdas, build-frontend]
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: app-backend/lambdas

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Deploy frontend to S3 + invalidate CloudFront
  # ────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync out/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude "*.html"

          # HTML dosyaları için cache yok (her zaman taze)
          aws s3 sync out/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html" \
            --exclude "*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
