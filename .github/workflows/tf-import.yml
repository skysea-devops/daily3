name: Terraform Import

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (dev or prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  import-dev:
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'dev'
    environment: dev
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=daily3-dev-tfstate" \
            -backend-config="key=daily3/dev/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -reconfigure

      - name: Import all Route53 records
        env:
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ZONE_ID: "Z01030371BF8ZEYMLLIMW"
        run: |
          tf_import() {
            echo ">>> Importing $1"
            terraform import -var-file=dev.tfvars "$1" "$2" && echo "OK: $1" || echo "SKIP: $1"
          }

          tf_import "aws_route53_record.mx"               "${ZONE_ID}_cogletta.com_MX"
          tf_import "aws_route53_record.spf"              "${ZONE_ID}_cogletta.com_TXT"
          tf_import "aws_route53_record.dmarc"            "${ZONE_ID}__dmarc.cogletta.com_TXT"
          tf_import "aws_route53_record.ses_verification" "${ZONE_ID}__amazonses.cogletta.com_TXT"
          tf_import 'aws_route53_record.ses_dkim[0]'      "${ZONE_ID}_jwjtjlhhofgtgerk3osiu2tkje4cnr4r._domainkey.cogletta.com_CNAME"
          tf_import 'aws_route53_record.ses_dkim[1]'      "${ZONE_ID}_3jjtgke7qshlhug7gbpkpzm7757e3hkd._domainkey.cogletta.com_CNAME"
          tf_import 'aws_route53_record.ses_dkim[2]'      "${ZONE_ID}_l6uenve6dp4qn6gsit3c7qzovnoqty6m._domainkey.cogletta.com_CNAME"
          tf_import 'aws_route53_record.frontend_aliases["dev.cogletta.com"]' "${ZONE_ID}_dev.cogletta.com_CNAME"
          tf_import 'aws_route53_record.cert_validation["dev.cogletta.com"]'  "${ZONE_ID}__db04904f98b9cd80a6149af033a752dc.dev.cogletta.com._CNAME"

  import-prod:
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'prod'
    environment: prod
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=cogletta-prod-tfstate" \
            -backend-config="key=cogletta/prod/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -reconfigure

      - name: Import all Route53 records
        env:
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ZONE_ID: "Z03485131CCMLXWDW7024"
        run: |
          tf_import() {
            echo ">>> Importing $1"
            terraform import -var-file=prod.tfvars "$1" "$2" && echo "OK: $1" || echo "SKIP: $1"
          }

          tf_import "aws_route53_record.mx"               "${ZONE_ID}_cogletta.com_MX"
          tf_import "aws_route53_record.spf"              "${ZONE_ID}_cogletta.com_TXT"
          tf_import "aws_route53_record.dmarc"            "${ZONE_ID}__dmarc.cogletta.com_TXT"
          tf_import "aws_route53_record.ses_verification" "${ZONE_ID}__amazonses.cogletta.com_TXT"
          tf_import 'aws_route53_record.ses_dkim[0]'      "${ZONE_ID}_l32lm3zdawzijvl5czhrmpd2vsetcn5a._domainkey.cogletta.com_CNAME"
          tf_import 'aws_route53_record.ses_dkim[1]'      "${ZONE_ID}_p3ukthlebr7gpxhfvblrnpj3egudm6vq._domainkey.cogletta.com_CNAME"
          tf_import 'aws_route53_record.ses_dkim[2]'      "${ZONE_ID}_sf5zlzhumegwmhyvipunknfdte5u2q7l._domainkey.cogletta.com_CNAME"
          tf_import 'aws_route53_record.frontend_aliases["cogletta.com"]' "${ZONE_ID}_cogletta.com_A"
          tf_import 'aws_route53_record.cert_validation["cogletta.com"]'  "${ZONE_ID}__2ac400cd6f92cf2f2e304a487e65f188.cogletta.com._CNAME"
